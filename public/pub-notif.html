<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
  --navy:#0A1F44;
  --navy-light:#123A7A;
  --gold:#D4AF37;
  --trans:all .3s ease;

  --white:#ffffff;
  --bg:#f4f7ff;
  --text:#0f172a;
  --muted:#64748b;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:linear-gradient(180deg,#eef3ff,#ffffff);
  color:var(--text);
  padding-bottom:60px;
}

/* ============================================================
   NAVBAR
============================================================ */
/* =========================
   NAVBAR FIXED VERSION
========================= */

:root{
  --shadow-lg:0 18px 40px rgba(0,0,0,.15);
}

body{
  padding-top:72px;
}

.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:99999;

  display:flex;
  align-items:center;
  justify-content:space-between;

  height:72px;
  padding:0 40px;

  background:rgba(10,22,40,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(201,151,43,.22);

  box-shadow:0 4px 24px rgba(0,0,0,.25);
}

/* NAV LINKS */

.nav-links{
  display:flex;
  align-items:center;
  gap:6px;

  list-style:none;
  margin:0;
  padding:0;
}

.nav-links li{
  list-style:none;
 
}

.nav-links a{
  display:block;
  text-decoration:none;

  color:#b8cbe4;

  font-size:13.5px;
  font-weight:500;

  padding:8px 14px;

  border-radius:8px;

  transition:.3s;
}

.nav-links a:hover{
  color:#fff;
  background:rgba(201,151,43,.15);
}

/* MOBILE LOGIN HIDE */

.mobile-login-item{
  display:none;
}

/* DROPDOWN */

.login-dropdown{
  position:relative;
}

.dropdown-menu{
  position:absolute;

  top:calc(100% + 10px);
  right:0;

  width:220px;

  background:#fff;

  border-radius:14px;

  overflow:hidden;

  border:1px solid rgba(0,0,0,.1);

  box-shadow:var(--shadow-lg);

  opacity:0;
  visibility:hidden;

  transform:translateY(-10px);

  transition:.3s;

  z-index:999999;
}

.dropdown-menu.show{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}

.dropdown-menu a{
  display:flex;
  align-items:center;

  padding:14px 18px;

  color:#111827;

  text-decoration:none;
}

.dropdown-menu a:hover{
  background:#f8fafc;
}

/* HAMBURGER */

.menu-toggle{
  display:none;

  width:42px;
  height:42px;

  border-radius:10px;

  background:rgba(255,255,255,.08);

  color:white;

  cursor:pointer;

  align-items:center;
  justify-content:center;

  font-size:22px;
}

/* MOBILE */

@media(max-width:900px){

  .navbar{
    padding:0 16px;
  }

  .desktop-login{
    display:none !important;
  }

  .mobile-login-item{
    display:block;
    width:100%;
  }

  .menu-toggle{
    display:flex;
  }

  .nav-links{
    position:absolute;

    top:76px;
    right:16px;

    width:280px;

    flex-direction:column;

    background:#12264d;

    border-radius:16px;

    padding:12px;

    opacity:0;
    visibility:hidden;

    transform:translateY(-10px);

    transition:.3s;

    box-shadow:0 20px 40px rgba(0,0,0,.25);
  }

  .nav-links.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
  }

  .nav-links li{
    width:100%;
  }

  .nav-links a{
    width:100%;
  }

  .login-btn{
    width:100%;
    justify-content:center;
  }

  .dropdown-menu{
    position:relative;

    width:100%;

    top:10px;
    right:auto;
  }
}
/* ================= SECTION ================= */
.notice-section{
  max-width:900px;
  margin:40px auto;
  padding:0 15px;
}

.title{
  text-align:center;
  font-size:28px;
  font-weight:800;
  color:var(--navy);
  margin-bottom:30px;
  position:relative;
}

.title::after{
  content:"";
  width:80px;
  height:3px;
  background:var(--gold);
  display:block;
  margin:8px auto;
  border-radius:10px;
}

/* ================= LIST ================= */
.notice-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ================= CARD ================= */
.notice-card{
  position:relative;

  background:var(--white);
  border-left:6px solid var(--gold);

  padding:20px;
  border-radius:16px;

  box-shadow:var(--shadow);
  transition:.3s;
  overflow:hidden;
}

.notice-card:hover{
  transform:translateY(-5px);
  border-left-color:var(--navy);
}

.notice-card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,var(--navy),var(--gold));
}

/* ================= TEXT ================= */
.notice-card h3{
  font-size:18px;
  font-weight:700;
  color:var(--navy);
  margin-bottom:8px;
}

.notice-card p{
  font-size:15px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:10px;
}

.notice-card small{
  color:#94a3b8;
  font-size:12px;
}

/* ================= NEW BADGE ================= */
.badge{
  position:absolute;
  top:12px;
  right:12px;

  background:var(--gold);
  color:#000;

  font-size:10px;
  font-weight:700;

  padding:4px 10px;
  border-radius:20px;

  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* ================= ACTIONS ================= */
.actions{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
  transition:.3s;
}

.btn.view{
  background:var(--navy);
  color:white;
}

.btn.download{
  background:var(--gold);
  color:#000;
}

.btn:hover{
  transform:scale(1.05);
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:25px 15px;
  margin-top:40px;
  background:var(--navy);
  color:white;
  font-size:13px;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  .title{
    font-size:22px;
  }

  .notice-card{
    padding:16px;
  }

  .notice-card h3{
    font-size:16px;
  }

  .notice-card p{
    font-size:14px;
  }
}


/* ==========================
   SCHOOL LOGO SECTION
========================== */

.logo{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    min-width:0;
}

/* LOGO IMAGE */

.logo img{
    width:52px;
    height:52px;

    border-radius:50%;
    object-fit:cover;

    background:#fff;

    padding:2px;

    border:2px solid #D4AF37;

    box-shadow:
    0 4px 15px rgba(212,175,55,.25);

    transition:.35s ease;
}

.logo img:hover{
    transform:rotate(8deg) scale(1.08);

    box-shadow:
    0 8px 20px rgba(212,175,55,.45);
}

/* TEXT WRAPPER */

.logo-text{
    display:flex;
    flex-direction:column;
    justify-content:center;

    line-height:1.2;

    white-space:nowrap;
}

/* SCHOOL NAME */

.school-name{
    font-size:17px;
    font-weight:800;

    color:#ffffff;

    letter-spacing:.3px;

    text-shadow:
    0 2px 8px rgba(0,0,0,.25);
}

/* TAGLINE */

.school-tagline{
    margin-top:2px;

    font-size:11px;
    font-weight:600;

    color:#D4AF37;

    text-transform:uppercase;

    letter-spacing:1px;
}

/* ==========================
   TABLET
========================== */

@media(max-width:768px){

    .logo{
        gap:10px;
    }

    .logo img{
        width:44px;
        height:44px;
    }

    .school-name{
        font-size:14px;
    }

    .school-tagline{
        font-size:9px;
        letter-spacing:.8px;
    }
}

/* ==========================
   SMALL MOBILE
========================== */

@media(max-width:480px){

    .logo{
        gap:8px;
    }

    .logo img{
        width:38px;
        height:38px;
    }

    .school-name{
        font-size:12px;
        max-width:150px;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .school-tagline{
        font-size:8px;
    }
}

/* ==========================
   VERY SMALL MOBILE
========================== */

@media(max-width:360px){

    .school-name{
        font-size:11px;
        max-width:120px;
    }

    .school-tagline{
        display:none;
    }
}


/* ==========================
   PREMIUM LOGIN BUTTON
========================== */

.desktop-login{
    display:flex;
    align-items:center;
}

.login-btn{
    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;

    min-width:120px;
    height:46px;

    padding:0 24px;

    border:none;
    border-radius:50px;

    background:linear-gradient(
        135deg,
        #D4AF37,
        #F5D76E
    );

    color:#081120;

    font-size:14px;
    font-weight:800;
    letter-spacing:.5px;

    cursor:pointer;

    overflow:hidden;

    transition:.35s ease;

    box-shadow:
        0 10px 25px rgba(212,175,55,.30);
}

/* Shine Effect */

.login-btn::before{
    content:"";

    position:absolute;

    top:-50%;
    left:-60px;

    width:30px;
    height:200%;

    background:rgba(255,255,255,.45);

    transform:rotate(25deg);

    transition:.8s;
}

.login-btn:hover::before{
    left:150%;
}

/* Hover */

.login-btn:hover{
    transform:translateY(-3px);

    box-shadow:
        0 18px 35px rgba(212,175,55,.45);
}

/* Click */

.login-btn:active{
    transform:translateY(0);
}

/* Focus */

.login-btn:focus{
    outline:none;
}

/* Mobile */

@media(max-width:768px){

    .login-btn{
        width:100%;
        height:44px;
        font-size:13px;
    }
}


.nav-links a.active{
  color:#e0aa14 !important;
  background:rgba(212,175,55,.12);
  border-radius:8px;
}
</style>
</head>

<body>

<!-- ============================================================
     NAVBAR
============================================================ -->
<header class="navbar">

  <div class="logo">
    <img src="logo.png" alt="School Logo">
    <div class="logo-text">
      <span class="school-name">GSS School Shilla</span>
      <span class="school-tagline">Est. Himachal Pradesh</span>
    </div>
  </div>

 <ul class="nav-links" id="navLinks">
  <li><a href="../index.html">Home</a></li>
  <li><a href="./pub-notif.html" class="active">Notices</a></li>
  <li><a href="./result.html">Results</a></li>
  <li><a href="./downloads.html">Downloads</a></li>
  <li><a href="./contact.html">Contact</a></li>

  <li class="mobile-login-item">
    <div class="login-dropdown">
      <button class="login-btn" id="loginBtnMobile">
        Login
      </button>

      <div class="dropdown-menu" id="dropdownMenuMobile">
        <a href="../admin/login.html">🛠️ Admin Panel</a>
        <a href="../no.html">🎓 Student Portal</a>
        <a href="../no.html">👨‍🏫 Teacher Portal</a>
      </div>
    </div>
  </li>
</ul>

  <div class="nav-actions">

    <!-- Desktop Login -->
    <div class="login-dropdown desktop-login">
      <button class="login-btn" id="loginBtn">
        Login
      </button>

      <div class="dropdown-menu" id="dropdownMenu">
        <a href="../admin/login.html">🛠️ Admin Panel</a>
        <a href="../no.html">🎓 Student Portal</a>
        <a href="../no.html">👨‍🏫 Teacher Portal</a>
      </div>
    </div>

    <div class="menu-toggle" id="menuToggle">☰</div>

  </div>

</header>



<section class="notice-section">

<h2 class="title">Latest Notifications</h2>

<div id="noticeList" class="notice-list"></div>

</section>

<footer>
© 2026 Govt Sr. Sec. School Shilla <br> All Rights Reserved </br>
</footer>

<script>

const API = "https://gsssshilla.onrender.com/notifications";

/* ================= LOAD NOTIFICATIONS ================= */

async function load() {

  try {

    const res = await fetch(API);

    if (!res.ok) throw new Error("API Error");

    const data = await res.json();

    const box = document.getElementById("noticeList");
    box.innerHTML = "";

    const now = new Date();

    data.forEach(n => {

      const created = new Date(n.created_at || n.createdAt || Date.now());

      const diffHours = (now - created) / (1000 * 60 * 60);
      const isNew = diffHours <= 48;

      /* ================= FILE URL FIX ================= */

      let fileURL = null;

      if (n.file) {

        // ✅ CASE 1: Cloudinary full URL
        if (n.file.startsWith("http")) {
          fileURL = n.file;
        }

        // ❌ CASE 2: Local upload (only if your server supports it)
        else {
          fileURL = `${n.file}`;
        }
      }

      box.innerHTML += `
        <div class="notice-card">

          ${isNew ? `<div class="badge">NEW</div>` : ""}

          <h3>${n.title || ""}</h3>
          <p>${n.message || ""}</p>

          <small>📅 ${created.toLocaleString()}</small>

          <div class="actions">

            ${fileURL ? `
              

              <a class="btn download"
                 href="${fileURL}"
                 download>View file</a>
            ` : ""}

          </div>

        </div>
      `;

    });

  } catch (err) {
    console.error(err);
    document.getElementById("noticeList").innerHTML =
      "<p style='color:red;text-align:center'>Failed to load notifications</p>";
  }
}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", () => {

  const menuToggle = document.getElementById("menuToggle");
  const navLinks = document.getElementById("navLinks");

  menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
    menuToggle.innerHTML = navLinks.classList.contains("active") ? "✕" : "☰";
  });

  document.querySelectorAll("#navLinks a").forEach(link => {
    link.addEventListener("click", () => {
      navLinks.classList.remove("active");
      menuToggle.innerHTML = "☰";
    });
  });

  function setupDropdown(btnId, menuId) {

    const btn = document.getElementById(btnId);
    const menu = document.getElementById(menuId);

    if (!btn || !menu) return;

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      menu.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove("show");
      }
    });
  }

  setupDropdown("loginBtn", "dropdownMenu");
  setupDropdown("loginBtnMobile", "dropdownMenuMobile");

  load();

});

</script>

</body>
</html>
