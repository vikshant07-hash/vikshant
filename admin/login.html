<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Inter',sans-serif;
  background:#0a1628;
  padding:24px 16px;
  position:relative;
  overflow-x:hidden;
}

/* BG ORBS */
.orb{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:0;
  filter:blur(90px);
}
.orb-1{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(201,151,43,.18),transparent 70%);
  top:-200px;right:-160px;
  animation:orbFloat 14s ease-in-out infinite alternate;
}
.orb-2{
  width:420px;height:420px;
  background:radial-gradient(circle,rgba(37,99,235,.14),transparent 70%);
  bottom:-160px;left:-120px;
  animation:orbFloat 18s ease-in-out infinite alternate-reverse;
}
.orb-3{
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(139,92,246,.1),transparent 70%);
  top:40%;left:35%;
  animation:orbFloat 22s ease-in-out infinite alternate;
}
@keyframes orbFloat{
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(50px) scale(1.06);}
}

/* GRID */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(201,151,43,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,151,43,.03) 1px,transparent 1px);
  background-size:50px 50px;
}

/* CARD */
.card{
  position:relative;
  z-index:1;
  width:100%;
  max-width:460px;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(201,151,43,.22);
  border-radius:26px;
  padding:46px 42px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 40px 80px rgba(0,0,0,.55),
    0 0 100px rgba(201,151,43,.06);
  animation:cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(28px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* LOGO ROW */
.logo-row{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  margin-bottom:28px;
}
.logo-ring{
  width:70px;height:70px;border-radius:50%;
  border:2px solid rgba(201,151,43,.45);
  background:rgba(201,151,43,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;position:relative;flex-shrink:0;
}
.logo-ring::before{
  content:'';position:absolute;inset:-5px;
  border-radius:50%;border:1px solid rgba(201,151,43,.15);
}
.logo-ring::after{
  content:'';position:absolute;inset:-11px;
  border-radius:50%;border:1px solid rgba(201,151,43,.07);
}
.brand-name{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:700;color:#fff;
  text-align:center;line-height:1.3;
}
.brand-tagline{
  font-size:11px;color:rgba(201,151,43,.8);
  text-transform:uppercase;letter-spacing:.1em;
  font-weight:600;text-align:center;margin-top:3px;
}

/* DIVIDER */
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,151,43,.3),transparent);
  margin:0 0 26px;
}

/* PAGE TITLE */
.page-title{text-align:center;margin-bottom:22px;}
.page-title h2{
  font-family:'Playfair Display',serif;
  font-size:23px;font-weight:700;color:#fff;
}
.page-title p{font-size:13px;color:rgba(255,255,255,.4);margin-top:5px;line-height:1.5;}

/* STEPS */
.steps-wrap{
  display:flex;align-items:flex-start;
  margin:0 0 26px;gap:0;
}
.step-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:7px;position:relative;
}
.step-item:not(:last-child)::after{
  content:'';
  position:absolute;top:13px;left:55%;width:90%;height:1px;
  background:rgba(255,255,255,.1);transition:.4s;
}
.step-item.done:not(:last-child)::after{
  background:linear-gradient(90deg,#c9972b,rgba(201,151,43,.25));
}
.step-circle{
  width:27px;height:27px;border-radius:50%;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,.28);
  transition:.3s;z-index:1;
}
.step-item.done .step-circle{
  background:linear-gradient(135deg,#c9972b,#e8b84b);
  border-color:#c9972b;color:#0a1628;
  box-shadow:0 0 12px rgba(201,151,43,.45);
}
.step-item.active .step-circle{
  border-color:rgba(201,151,43,.6);
  color:rgba(201,151,43,.85);
  background:rgba(201,151,43,.08);
}
.step-label{
  font-size:10px;font-weight:600;
  color:rgba(255,255,255,.22);
  letter-spacing:.03em;white-space:nowrap;transition:.3s;
}
.step-item.done .step-label,
.step-item.active .step-label{color:rgba(201,151,43,.7);}

/* FIELD LABEL */
.field-label{
  display:block;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.45);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:7px;
}

/* INPUT */
.input-wrap{position:relative;margin-bottom:14px;}
.input-icon{
  position:absolute;left:14px;top:50%;
  transform:translateY(-50%);
  font-size:15px;pointer-events:none;
  color:rgba(201,151,43,.5);
}
.input-wrap input{
  width:100%;height:46px;
  padding:0 14px 0 42px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  color:#fff;font-size:16px;
  font-family:'Inter',sans-serif;
  outline:none;transition:.25s;
  -webkit-appearance:none;
}
.input-wrap input::placeholder{color:rgba(255,255,255,.22);}
.input-wrap input:focus{
  border-color:rgba(201,151,43,.55);
  background:rgba(255,255,255,.07);
  box-shadow:0 0 0 3px rgba(201,151,43,.1);
}
.input-wrap input:read-only{opacity:.55;cursor:not-allowed;}

/* CAPTCHA */
.captcha-row{
  display:flex;gap:10px;align-items:center;
  margin-bottom:14px;
}
#captchaCanvas{
  flex:1;height:52px;border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  max-width:100%;
}
.refresh-btn{
  width:50px;height:52px;flex-shrink:0;
  border:none;border-radius:12px;
  background:rgba(201,151,43,.12);
  border:1px solid rgba(201,151,43,.28);
  color:#e8b84b;font-size:22px;font-weight:700;
  cursor:pointer;transition:.35s;
  display:flex;align-items:center;justify-content:center;
}
.refresh-btn:hover{
  transform:rotate(180deg);
  background:rgba(201,151,43,.2);
}

/* PRIMARY BUTTON */
.btn-primary{
  width:100%;height:48px;
  border:none;border-radius:12px;
  font-size:14px;font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;transition:.3s ease;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#c9972b,#e8b84b);
  color:#0a1628;
  box-shadow:0 8px 24px rgba(201,151,43,.3);
  margin-top:2px;
}
.btn-primary::before{
  content:'';position:absolute;
  width:30px;height:200%;
  background:rgba(255,255,255,.35);
  top:-50%;left:-60px;
  transform:rotate(25deg);transition:.7s;
}
.btn-primary:hover::before{left:160%;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(201,151,43,.4);}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* OTP SECTION */
#otpSection{
  display:none;flex-direction:column;gap:0;
  margin-top:18px;padding-top:18px;
  border-top:1px solid rgba(255,255,255,.07);
}

/* BADGES */
.info-badge{
  display:flex;align-items:center;gap:9px;
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;font-weight:600;
  margin-bottom:14px;
}
.badge-green{
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.22);
  color:#34d399;
}
.badge-gold{
  background:rgba(201,151,43,.1);
  border:1px solid rgba(201,151,43,.25);
  color:rgba(201,151,43,.9);
}
.timer-badge{
  display:none;
}

/* MSG */
#msg{
  display:none;
  font-size:13px;font-weight:600;
  padding:11px 14px;border-radius:10px;
  text-align:center;margin-top:6px;
}
#msg.success{
  display:block;
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.22);
  color:#34d399;
}
#msg.error{
  display:block;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.22);
  color:#f87171;
}

/* LOADER */
.loader-box{display:none;text-align:center;padding:10px 0 4px;}
.loader{
  width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);
  border-top:3px solid #c9972b;
  border-right:3px solid rgba(201,151,43,.35);
  animation:spin .75s linear infinite;
  margin:0 auto 8px;
}
@keyframes spin{100%{transform:rotate(360deg);}}
.loader-box p{font-size:12px;color:rgba(255,255,255,.4);}

/* FORGOT */
.links-row{display:flex;justify-content:flex-end;margin-top:14px;}
.forgot-link{
  font-size:13px;font-weight:600;
  color:rgba(201,151,43,.75);
  text-decoration:none;transition:.2s;
}
.forgot-link:hover{color:#e8b84b;text-decoration:underline;}

/* =============================================
   RESPONSIVE
============================================= */

/* Tablet 768px */
@media(max-width:768px){
  body{padding:20px 14px;align-items:flex-start;padding-top:28px;}
  .card{max-width:100%;padding:38px 30px;border-radius:22px;}
  .logo-ring{width:62px;height:62px;font-size:26px;}
  .brand-name{font-size:16px;}
  .page-title h2{font-size:21px;}
  .page-title p{font-size:12.5px;}
  #captchaCanvas{height:50px;}
  .refresh-btn{width:46px;height:50px;}
  .btn-primary{height:46px;}
  .step-label{font-size:9.5px;}
}

/* Mobile 600px */
@media(max-width:600px){
  body{padding:14px 12px;padding-top:20px;}

  .card{padding:30px 22px;border-radius:20px;}

  .logo-row{gap:10px;margin-bottom:22px;}
  .logo-ring{width:56px;height:56px;font-size:23px;}
  .logo-ring::before{inset:-4px;}
  .logo-ring::after{inset:-8px;}
  .brand-name{font-size:14.5px;}
  .brand-tagline{font-size:10px;letter-spacing:.07em;}

  .divider{margin:0 0 20px;}

  .page-title{margin-bottom:18px;}
  .page-title h2{font-size:19px;}
  .page-title p{font-size:12px;}

  .steps-wrap{margin-bottom:20px;}
  .step-circle{width:25px;height:25px;font-size:10px;}
  .step-item:not(:last-child)::after{top:12px;}
  .step-label{font-size:9px;}

  .field-label{font-size:10.5px;margin-bottom:6px;}

  .input-wrap{margin-bottom:12px;}
  .input-wrap input{height:44px;font-size:16px;padding:0 12px 0 40px;}
  .input-icon{font-size:14px;left:12px;}

  .captcha-row{gap:8px;margin-bottom:12px;}
  #captchaCanvas{height:48px;}
  .refresh-btn{width:44px;height:48px;font-size:20px;}

  .btn-primary{height:46px;font-size:13.5px;border-radius:11px;}

  .info-badge{font-size:12px;padding:9px 12px;margin-bottom:12px;}

  #msg{font-size:12.5px;padding:10px 12px;}

  .loader-box p{font-size:11px;}
  .forgot-link{font-size:12.5px;}
  .links-row{margin-top:10px;}
}

/* Small Mobile 420px */
@media(max-width:420px){
  body{padding:10px;padding-top:14px;}

  .card{padding:26px 18px;border-radius:18px;}

  .logo-ring{width:52px;height:52px;font-size:21px;}
  .logo-ring::after{display:none;}

  .brand-name{font-size:13.5px;}
  .brand-tagline{display:none;}

  .page-title h2{font-size:18px;}
  .page-title p{font-size:11.5px;}

  .step-circle{width:24px;height:24px;font-size:10px;}

  .input-wrap input{height:43px;}

  .btn-primary{height:44px;font-size:13px;}

  #captchaCanvas{height:46px;}
  .refresh-btn{width:42px;height:46px;}
}

/* Very Small 360px */
@media(max-width:360px){
  .card{padding:22px 14px;border-radius:16px;}

  .logo-ring{width:48px;height:48px;font-size:19px;}
  .brand-name{font-size:12.5px;}

  .page-title h2{font-size:17px;}
  .page-title p{display:none;}

  .steps-wrap{margin-bottom:16px;}
  .step-label{display:none;}

  .captcha-row{flex-direction:column;align-items:stretch;}
  #captchaCanvas{width:100%;height:48px;}
  .refresh-btn{width:100%;height:42px;border-radius:10px;transform:none !important;}

  .btn-primary{height:43px;font-size:13px;}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-bg"></div>

<div class="card">

  <!-- LOGO -->
  <div class="logo-row">
    <div class="logo-ring">🏫</div>
    <div>
      <div class="brand-name">Govt. Sr. Sec. School Shilla</div>
      <div class="brand-tagline">Admin Portal</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- TITLE -->
  <div class="page-title">
    <h2>Welcome Back</h2>
    <p>Secure login with OTP verification</p>
  </div>

  <!-- STEPS BAR -->
  <div class="steps-wrap" id="stepsBar">
    <div class="step-item active" id="step1">
      <div class="step-circle">1</div>
      <div class="step-label">Credentials</div>
    </div>
    <div class="step-item" id="step2">
      <div class="step-circle">2</div>
      <div class="step-label">OTP</div>
    </div>
    <div class="step-item" id="step3">
      <div class="step-circle">3</div>
      <div class="step-label">Done</div>
    </div>
  </div>

  <!-- USERNAME -->
  <label class="field-label">Username</label>
  <div class="input-wrap">
    <span class="input-icon">👤</span>
    <input type="text" id="username" placeholder="Enter username" autocomplete="off">
  </div>

  <!-- PASSWORD -->
  <label class="field-label">Password</label>
  <div class="input-wrap">
    <span class="input-icon">🔒</span>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>

  <!-- CAPTCHA -->
  <label class="field-label">Security Captcha</label>
  <div class="captcha-row">
    <canvas id="captchaCanvas" width="300" height="52"></canvas>
    <button type="button" class="refresh-btn" onclick="generateCaptcha()" title="Refresh">↻</button>
  </div>
  <div class="input-wrap">
    <span class="input-icon">🛡️</span>
    <input type="text" id="captchaInput" placeholder="Type the characters above">
  </div>

  <!-- SEND OTP BUTTON -->
  <button class="btn-primary" id="sendOtpBtn" onclick="sendOTP()">
    Send OTP →
  </button>

  <!-- OTP SECTION -->
  <div id="otpSection">

    <div class="info-badge badge-green">
      ✅ OTP sent — check your registered email
    </div>

    <div class="info-badge badge-gold timer-badge" id="timerBadge">
      ⏱️ OTP expires in: <span id="timerDisplay">05:00</span>
    </div>

    <label class="field-label">Enter OTP</label>
    <div class="input-wrap">
      <span class="input-icon">🔑</span>
      <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6" autocomplete="off">
    </div>

    <button class="btn-primary" id="loginBtn" onclick="login()">
      Login →
    </button>

  </div>

  <!-- LOADER -->
  <div class="loader-box" id="loader">
    <div class="loader"></div>
    <p>Please wait...</p>
  </div>

  <!-- MESSAGE -->
  <div id="msg"></div>

  <!-- FORGOT -->
  <div class="links-row">
    <a href="forgot.html" class="forgot-link">Forgot Password?</a>
  </div>

</div>

<script>

/* ---- INSTANT AUTH CHECK ---- */
const _t = localStorage.getItem("token");
if(_t){ window.location.replace("admin-dashboard.html"); }

window.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("token");
  if(!token) return;
  try{
    const res = await fetch("https://gsssshilla.onrender.com/verify-admin",{
      method:"GET",
      headers:{ Authorization:`Bearer ${token}` }
    });
    const data = await res.json();
    if(data.success){ window.location.replace("admin-dashboard.html"); }
    else{ localStorage.removeItem("token"); }
  }catch{ localStorage.removeItem("token"); }
});

/* ---- STEP PROGRESS ---- */
function setStep(n){
  ["step1","step2","step3"].forEach((id,i)=>{
    const el = document.getElementById(id);
    el.classList.remove("done","active");
    if(i+1 < n)  el.classList.add("done");
    if(i+1 === n) el.classList.add("active");
  });
}

/* ---- CAPTCHA ---- */
let generatedCaptcha = "";

function generateCaptcha(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  generatedCaptcha = "";
  for(let i=0;i<6;i++) generatedCaptcha += chars[Math.floor(Math.random()*chars.length)];
  drawCaptcha(generatedCaptcha);
}

function drawCaptcha(text){
  const canvas = document.getElementById("captchaCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,"#e2e8f0"); g.addColorStop(1,"#cbd5e1");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<8;i++){
    ctx.strokeStyle=`rgba(${Math.random()*200},${Math.random()*200},${Math.random()*200},.6)`;
    ctx.lineWidth=1.2;ctx.beginPath();
    ctx.moveTo(Math.random()*canvas.width,Math.random()*canvas.height);
    ctx.lineTo(Math.random()*canvas.width,Math.random()*canvas.height);
    ctx.stroke();
  }
  for(let i=0;i<90;i++){
    ctx.fillStyle=`rgba(${Math.random()*200},${Math.random()*200},${Math.random()*200},.65)`;
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,1.4,0,Math.PI*2);
    ctx.fill();
  }
  for(let i=0;i<text.length;i++){
    const x=28+i*38, y=34+(Math.random()-.5)*8, a=(Math.random()-.5)*.5;
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.font="bold 26px Arial";
    ctx.fillStyle=`rgb(${Math.floor(Math.random()*80)},${Math.floor(Math.random()*80)},${Math.floor(Math.random()*80)})`;
    ctx.fillText(text[i],0,0); ctx.restore();
  }
}
generateCaptcha();

/* ---- HELPERS ---- */
function showMessage(text,type){
  const msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = type==="success" ? "success" : "error";
}
function showLoader(){ document.getElementById("loader").style.display="block"; }
function hideLoader(){ document.getElementById("loader").style.display="none"; }

/* ---- OTP TIMER ---- */
let otpTimer=null, otpTimeLeft=300;

function startOtpTimer(){
  otpTimeLeft=300;
  const badge=document.getElementById("timerBadge");
  badge.style.display="flex";

  otpTimer=setInterval(()=>{
    otpTimeLeft--;
    const m=String(Math.floor(otpTimeLeft/60)).padStart(2,"0");
    const s=String(otpTimeLeft%60).padStart(2,"0");
    document.getElementById("timerDisplay").innerText=`${m}:${s}`;
    if(otpTimeLeft<=0){ clearInterval(otpTimer); resetOtpFlow(); }
  },1000);
}

function resetOtpFlow(){
  clearInterval(otpTimer);
  const btn=document.getElementById("sendOtpBtn");
  btn.disabled=false; btn.innerText="Send OTP →";
  document.getElementById("otpSection").style.display="none";
  document.getElementById("timerBadge").style.display="none";
  document.getElementById("otp").value="";
  document.getElementById("username").readOnly=false;
  document.getElementById("password").readOnly=false;
  showMessage("OTP expired. Please request a new one.","error");
  generateCaptcha();
  document.getElementById("captchaInput").value="";
  setStep(1);
}

/* ---- SEND OTP ---- */
async function sendOTP(){
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();
  const captchaInput=document.getElementById("captchaInput").value.trim();

  if(!username)           return showMessage("Enter username","error");
  if(password.length<6)   return showMessage("Password must be at least 6 characters","error");
  if(!captchaInput)        return showMessage("Enter captcha","error");
  if(captchaInput.toUpperCase()!==generatedCaptcha.toUpperCase()){
    showMessage("Wrong captcha — try again","error");
    generateCaptcha();
    document.getElementById("captchaInput").value="";
    return;
  }

  const btn=document.getElementById("sendOtpBtn");
  btn.disabled=true; btn.innerText="Sending…";
  showLoader();

  try{
    const res=await fetch("https://gsssshilla.onrender.com/send-otp",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password}),
      signal:AbortSignal.timeout(10000)
    });
    const data=await res.json();
    hideLoader();

    if(data.success){
      showMessage("OTP sent successfully!","success");
      btn.innerText="OTP Sent ✓";
      document.getElementById("username").readOnly=true;
      document.getElementById("password").readOnly=true;
      document.getElementById("otpSection").style.display="flex";
      setStep(2);
      startOtpTimer();
    }else{
      btn.disabled=false; btn.innerText="Send OTP →";
      generateCaptcha();
      document.getElementById("captchaInput").value="";
      showMessage(data.message||"Failed to send OTP","error");
    }
  }catch{
    hideLoader();
    btn.disabled=false; btn.innerText="Send OTP →";
    showMessage("Server error. Please try again.","error");
  }
}

/* ---- LOGIN ---- */
async function login(){
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();
  const otp=document.getElementById("otp").value.trim().toUpperCase();

  if(otp.length!==6) return showMessage("Enter valid 6-digit OTP","error");

  const btn=document.getElementById("loginBtn");
  btn.disabled=true; btn.innerText="Verifying…";
  showLoader();

  try{
    const res=await fetch("https://gsssshilla.onrender.com/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password,otp}),
      signal:AbortSignal.timeout(10000)
    });
    const data=await res.json();
    hideLoader();

    if(data.success){
      clearInterval(otpTimer);
      localStorage.setItem("token",data.token);
      sessionStorage.removeItem("token");
      setStep(3);
      showMessage("Login successful! Redirecting…","success");
      setTimeout(()=>{ window.location.replace("admin-dashboard.html"); },1000);
    }else{
      btn.disabled=false; btn.innerText="Login →";
      showMessage(data.message||"Login failed","error");
    }
  }catch{
    hideLoader();
    btn.disabled=false; btn.innerText="Login →";
    showMessage("Server error. Please try again.","error");
  }
}

/* ---- ENTER KEY ---- */
document.addEventListener("keydown",function(e){
  if(e.key!=="Enter") return;
  const otpVisible=document.getElementById("otpSection").style.display;
  if(otpVisible==="flex") login(); else sendOTP();
});

</script>
