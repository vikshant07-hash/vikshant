
<!DOCTYPE html>
<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Contact Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

:root{
  --primary:#1E3A8A;
  --primary-light:#3B82F6;
  --gold:#D4AF37;
  --danger:#ef4444;

  --bg:#0f172a;
  --bg2:#1e293b;

  --card:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);

  --text:#f8fafc;
  --muted:#94a3b8;

  --shadow:0 12px 35px rgba(0,0,0,.35);
  --shadow-hover:0 20px 45px rgba(0,0,0,.45);
}

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  background:
  linear-gradient(
  135deg,
  #0f172a,
  #1e293b,
  #0b1220
  );

  min-height:100vh;
  color:var(--text);
}

/* ================= NAVBAR ================= */

.navbar{
  width:100%;
  position:sticky;
  top:0;
  z-index:9999;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:14px 25px;

  background:
  linear-gradient(
  135deg,
  #081C45,
  #123A7A
  );

  box-shadow:var(--shadow);
}

.logo-section{
  display:flex;
  align-items:center;
  gap:12px;
}

.school-logo{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid var(--gold);
  background:#fff;
}

.school-info h2{
  color:#fff;
  font-size:18px;
  margin:0;
}

.nav-menu{
  display:flex;
  align-items:center;
  gap:8px;
}

.nav-menu a{
  text-decoration:none;
  color:#dbeafe;

  padding:10px 14px;

  border-radius:10px;

  font-size:14px;
  font-weight:600;

  transition:.3s;
}

.nav-menu a:hover{
  background:rgba(212,175,55,.15);
}

.nav-menu a.active{
  background:var(--gold);
  color:#081C45;
}

.logout-btn{
  border:none;

  background:
  linear-gradient(
  135deg,
  #2334a8,
  #F5D76E
  );

  color:#081C45;

  padding:10px 18px;

  border-radius:50px;

  font-weight:700;

  cursor:pointer;
}

.mobile-menu-btn{
  display:none;
  color:white;
  font-size:30px;
  cursor:pointer;
}

/* ================= PAGE TITLE ================= */

body > h2{
  text-align:center;
  margin:25px 15px;
  font-size:30px;
  color:var(--gold);
}

/* ================= BOX ================= */

.box{
  width:95%;
  max-width:1100px;

  margin:20px auto;

  padding:22px;

  border-radius:20px;

  background:var(--card);

  border:1px solid var(--border);

  backdrop-filter:blur(18px);

  box-shadow:var(--shadow);
}

/* ================= FORM ================= */

input,
textarea{
  width:100%;

  padding:14px;

  margin:10px 0;

  border-radius:12px;

  border:1px solid var(--border);

  background:rgba(255,255,255,.05);

  color:white;

  outline:none;

  transition:.3s;
}

textarea{
  min-height:120px;
  resize:vertical;
}

input:focus,
textarea:focus{
  border-color:#38bdf8;
  box-shadow:0 0 15px rgba(56,189,248,.25);
}

button{
  border:none;

  padding:12px 20px;

  border-radius:12px;

  background:
  linear-gradient(
  135deg,
  #38bdf8,
  #6366f1
  );

  color:white;

  font-weight:600;

  cursor:pointer;

  transition:.3s;
}

button:hover{
  transform:translateY(-3px);
}

/* ================= MESSAGE GRID ================= */

#msgContainer{
  display:grid;

  grid-template-columns:
  repeat(
  auto-fit,
  minmax(320px,1fr)
  );

  gap:18px;
}

/* ================= MESSAGE CARD ================= */

.msg-card{
  background:
  rgba(255,255,255,.06);

  border:1px solid var(--border);

  backdrop-filter:blur(14px);

  border-radius:18px;

  padding:18px;

  position:relative;

  overflow:hidden;

  min-height:220px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  transition:.35s;
}

.msg-card:hover{
  transform:translateY(-8px);
  box-shadow:var(--shadow-hover);
}

.msg-card::before{
  content:"";

  position:absolute;

  top:0;
  left:-100%;

  width:100%;
  height:100%;

  background:
  linear-gradient(
  90deg,
  transparent,
  rgba(255,255,255,.08),
  transparent
  );

  transition:.6s;
}

.msg-card:hover::before{
  left:100%;
}

.msg-card h4{
  font-size:17px;
  color:#fff;

  word-break:break-word;
}

.msg-card small{
  color:var(--muted);

  word-break:break-word;
}

.msg-card p{
  margin:15px 0;

  line-height:1.7;

  color:#e2e8f0;

  word-break:break-word;
}

.msg-time{
  display:flex;
  justify-content:space-between;

  gap:10px;

  margin-top:12px;

  padding-top:10px;

  border-top:1px solid rgba(255,255,255,.08);

  color:var(--muted);

  font-size:13px;
}

.msg-card button{
  width:100%;

  margin-top:12px;

  background:
  linear-gradient(
  135deg,
  #ef4444,
  #dc2626
  );
}

/* ================= TABLE SUPPORT ================= */

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1e293b;
  color:white;
  padding:12px;
}

td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

/* ================= MOBILE ================= */

@media(max-width:950px){

  .mobile-menu-btn{
    display:block;
  }

  .nav-menu{
    display:none;

    position:absolute;

    top:100%;
    right:15px;

    width:240px;

    background:#081C45;

    flex-direction:column;

    padding:15px;

    border-radius:16px;

    box-shadow:0 20px 40px rgba(0,0,0,.3);
  }

  .nav-menu.active{
    display:flex;
  }

  .nav-menu a{
    width:100%;
  }

  .logout-btn{
    width:100%;
  }

}

@media(max-width:768px){

  body > h2{
    font-size:24px;
  }

  .box{
    width:95%;
    padding:15px;
  }

  #msgContainer{
    grid-template-columns:1fr;
  }

  .msg-time{
    flex-direction:column;
    gap:5px;
  }

}

@media(max-width:600px){

  .navbar{
    padding:12px;
  }

  .school-logo{
    width:45px;
    height:45px;
  }

  .school-info h2{
    font-size:14px;
  }

  body > h2{
    font-size:22px;
  }

  .msg-card{
    padding:14px;
  }

}

@media(max-width:450px){

  .school-info h2{
    font-size:12px;
  }

  .nav-menu{
    width:220px;
  }

  body > h2{
    font-size:20px;
  }

}

</style>
</head>

<body>

 <header class="navbar">

    <!-- Left Logo -->
    <div class="logo-section">

        <img src="../1778132110413-ChatGPT Image May 7, 2026, 10_56_26 AM.png" alt="School Logo" class="school-logo">

        <div class="school-info">
            <h2>Govt. Sr. Sec. School Shilla</h2>
            
        </div>

    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu-btn" id="menuToggle">
        Menu
    </div>

    <!-- Nav -->
    <nav class="nav-menu" id="navLinks">

        <a href="admin-dashboard.html">Dashboard</a>

        <a href="add-image.html">
            Gallery
        </a>

        <a href="admin-img.html">
            Home Slider
        </a>

        <a href="admin-faculity.html">
            Faculty
        </a>

        <a href="admin-notif.html">
            Notifications
        </a>

        <a href="admin-downl.html">
            Downloads
        </a>

        <a href="admin-contact.html" class="active">
            Contact
        </a>

       

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </nav>

</header>

<h2>Contact Settings</h2>

<div class="box">
  <input type="text" id="school_name" placeholder="School Name">
  <textarea id="address" placeholder="Address"></textarea>
  <input type="text" id="phone" placeholder="Phone">
  <input type="email" id="email" placeholder="Email">

  <button onclick="updateInfo()">Update</button>
</div>

<h2>Messages</h2>

<div id="msgContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// ✅ Token globally define karo, localStorage se
const token = localStorage.getItem("token");

if (!token) {
  window.location.replace("login.html");
}

// Auth verify (optional double-check)
fetch("https://gsssshilla.onrender.com/verify-admin", {
  headers: { Authorization: `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {
  if (!data.success) {
    localStorage.removeItem("token");
    window.location.replace("login.html");
  }
})
.catch(() => {
  localStorage.removeItem("token");
  window.location.replace("login.html");
});


const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {

    navLinks.classList.toggle("active");

    menuToggle.innerHTML =
    navLinks.classList.contains("active")
    ? "close"
    : "Menu";

});

function logout(){

    const navLinks = document.getElementById("navLinks");
    const menuToggle = document.getElementById("menuToggle");

    navLinks.classList.remove("active");

    if(menuToggle){
        menuToggle.innerHTML = "Menu";
    }

    Swal.fire({
        title: "Logout?",
        text: "Do you really want to logout from Admin Panel?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#D4AF37",
        cancelButtonColor: "#123A7A",
        confirmButtonText: "Yes, Logout",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            localStorage.removeItem("token");
            sessionStorage.clear();

            window.location.replace("login.html");
        }

    });

}

// LOAD INFO
async function loadInfo(){
  const res = await fetch("https://gsssshilla.onrender.com/admin/contact/info");
  const data = await res.json();

  document.getElementById("school_name").value = data.school_name;
  document.getElementById("address").value = data.address;
  document.getElementById("phone").value = data.phone;
  document.getElementById("email").value = data.email;
}

// UPDATE INFO
async function updateInfo(){
  const data = {
    school_name:document.getElementById("school_name").value,
    address:document.getElementById("address").value,
    phone:document.getElementById("phone").value,
    email:document.getElementById("email").value
  };

  const res = await fetch("https://gsssshilla.onrender.com/admin/contact/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message);
}

async function loadMessages(){
  const res = await fetch("https://gsssshilla.onrender.com/admin/contact/messages");
  const data = await res.json();

  const container = document.getElementById("msgContainer");
  container.innerHTML = "";

  data.forEach(msg => {

    const dateObj = new Date(msg.created_at || Date.now());

    const date = dateObj.toLocaleDateString();
    const time = dateObj.toLocaleTimeString();

    const card = `
      <div class="msg-card">

        <h4>${msg.name}</h4>
        <small>E-mail ${msg.email}</small>

        <p>${msg.message}</p>

        <div class="msg-time">
          <span>Date ${date}</span>
          <span>Time ${time}</span>
        </div>

        <button onclick="deleteMsg(${msg.id})">
          Delete
        </button>

      </div>
    `;

    container.innerHTML += card;
  });
}

// DELETE
async function deleteMsg(id){
  await fetch(`https://gsssshilla.onrender.com/admin/contact/delete/${id}`,{
    method:"DELETE"
  });

  location.reload();
}

// INIT
loadInfo();
loadMessages();

</script>

</body>
</html>
