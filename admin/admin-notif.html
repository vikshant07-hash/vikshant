<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications Admin | GSSS Shilla</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --primary:#1E3A8A;
  --primary-light:#3B82F6;
  --gold:#F59E0B;
  --bg:#f6f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:rgba(15,23,42,.08);
  --shadow:0 10px 25px rgba(0,0,0,.06);
  --shadow-hover:0 18px 40px rgba(0,0,0,.12);
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body{ background:linear-gradient(135deg,#f8fbff,#ffffff,#fffaf2); color:var(--text); }

/* ================= PAGE WRAPPER ================= */
.page-wrap{ padding:30px 20px 50px; max-width:900px; margin:0 auto; }

.page-wrap h2{
  text-align:center; font-size:26px; font-weight:700;
  color:var(--primary); margin-bottom:22px;
}

/* ================= FORM ================= */
#noticeForm{
  background:var(--card); padding:22px; border-radius:18px;
  border:1px solid var(--border); box-shadow:var(--shadow);
  display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:30px;
}

#noticeForm input,
#noticeForm select,
#noticeForm textarea{
  padding:13px 14px; border-radius:12px; border:1px solid var(--border);
  outline:none; font-size:15px; background:#f9fbff; width:100%;
  transition:.25s;
}
#noticeForm input:focus,
#noticeForm select:focus,
#noticeForm textarea:focus{ border-color:var(--primary-light); }

#noticeForm textarea{ grid-column:1/-1; min-height:110px; resize:vertical; }

#noticeForm input[type="file"]{
  grid-column:1/-1; background:#f9fbff; border:1.5px dashed #cbd5e1;
  cursor:pointer; padding:12px;
}

#noticeForm label{
  grid-column:1/-1; display:flex; align-items:center; gap:10px;
  font-size:14px; color:#475569; padding:4px 0;
}
#noticeForm input[type="checkbox"]{
  width:18px; height:18px; accent-color:var(--primary); flex-shrink:0;
}

#noticeForm button{
  grid-column:1/-1; height:50px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff; font-weight:600; font-size:15px; cursor:pointer; transition:.25s;
}
#noticeForm button:hover{ transform:translateY(-2px); box-shadow:var(--shadow-hover); }

/* ================= LIST ================= */
.notice-list{ display:grid; gap:16px; }

.card{
  background:var(--card); padding:18px 20px; border-radius:16px;
  box-shadow:var(--shadow); border-left:5px solid var(--primary);
  transition:.25s;
}
.card:hover{ box-shadow:var(--shadow-hover); }

.card h3{ color:var(--primary); font-size:16px; margin-bottom:6px; }
.card p{ font-size:13.5px; color:#475569; line-height:1.6; margin-bottom:8px; }

.important-badge{
  display:inline-block; font-size:11px; font-weight:700;
  color:#fff; background:linear-gradient(135deg,#ef4444,#dc2626);
  padding:3px 10px; border-radius:100px; margin-bottom:8px;
  letter-spacing:.03em; text-transform:uppercase;
}

.meta{ font-size:12px; color:var(--muted); margin-top:4px; }

.actions{ margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }

.actions a, .actions button{
  display:inline-flex; align-items:center; justify-content:center;
  padding:8px 16px; border-radius:10px; font-size:12.5px; font-weight:600;
  border:none; cursor:pointer; text-decoration:none; color:#fff;
  transition:.25s;
}

.file-link{ background:linear-gradient(135deg,var(--gold),#fbbf24); color:#1e1300; }
.delete-btn{ background:linear-gradient(135deg,#ef4444,#dc2626); }
.actions a:hover, .actions button:hover{ transform:translateY(-2px); }

.no-data{
  text-align:center; padding:40px; background:var(--card);
  border-radius:16px; box-shadow:var(--shadow); color:var(--muted); font-weight:500;
}

/* ================= NAVBAR (shared admin pattern) ================= */
.navbar{
  width:100%; position:sticky; top:0; z-index:9999;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(135deg,#081C45,#123A7A);
  padding:14px 25px; box-shadow:0 10px 30px rgba(0,0,0,.15); margin-bottom:10px;
}
.logo-section{ display:flex; align-items:center; gap:14px; }
.school-logo{ width:55px; height:55px; border-radius:50%; object-fit:cover; border:3px solid #D4AF37; background:#fff; }
.school-info{ display:flex; flex-direction:column; }
.school-info h2{ color:#fff; font-size:18px; font-weight:700; line-height:1.2; }
.school-info span{ color:#D4AF37; font-size:12px; font-weight:500; }

.nav-menu{ display:flex; align-items:center; gap:8px; }
.nav-menu a{
  text-decoration:none; color:#dbeafe; padding:11px 15px;
  border-radius:10px; font-size:14px; font-weight:600; transition:.3s;
}
.nav-menu a:hover{ background:rgba(212,175,55,.15); color:#fff; }
.nav-menu a.active{ background:#D4AF37; color:#081C45; }

.logout-btn{
  margin-left:10px; border:none;
  background:linear-gradient(135deg,#19347e,#F5D76E); color:#081C45;
  padding:11px 22px; border-radius:50px; font-size:14px; font-weight:700;
  cursor:pointer; transition:.3s;
}
.logout-btn:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(212,175,55,.35); }

.mobile-menu-btn{ display:none; color:#fff; font-size:28px; cursor:pointer; }

/* ================= RESPONSIVE (single, ordered, no later overrides) ================= */

@media (max-width:1200px){
  .school-info h2{ font-size:16px; }
  .nav-menu a{ padding:10px 12px; font-size:13px; }
}

@media (max-width:992px){
  .page-wrap{ padding:24px 16px 40px; }
}

@media (max-width:950px){
  .mobile-menu-btn{ display:block; }
  .nav-menu{
    position:absolute; top:100%; left:0; right:0; background:#081C45;
    flex-direction:column; padding:15px; gap:5px; display:none;
    box-shadow:0 15px 30px rgba(0,0,0,.2);
  }
  .nav-menu.active{ display:flex; }
  .nav-menu a{ width:100%; text-align:left; }
  .logout-btn{ width:100%; margin:10px 0 0; }
}

@media (max-width:768px){
  .page-wrap h2{ font-size:22px; }

  #noticeForm{ grid-template-columns:1fr; padding:16px; border-radius:16px; }
  #noticeForm input, #noticeForm select, #noticeForm textarea{ font-size:16px; } /* iPhone zoom fix */

  .card{ padding:16px; }
  .card h3{ font-size:16px; }
  .meta{ font-size:11px; line-height:1.5; }

  .actions{ flex-direction:column; }
  .actions a, .actions button{ width:100%; }
}

@media (max-width:600px){
  .navbar{ padding:12px 15px; }
  .school-logo{ width:45px; height:45px; }
  .school-info h2{ font-size:14px; }
  .school-info span{ font-size:11px; }
}

@media (max-width:480px){
  .page-wrap{ padding:18px 12px 32px; }
  .page-wrap h2{ font-size:20px; }
  #noticeForm{ padding:14px; }
}

@media (max-width:450px){
  .school-info h2{ font-size:13px; }
  .school-info span{ display:none; }
}
</style>
</head>

<body>

<header class="navbar">
  <div class="logo-section">
    <img src="../1778132110413-ChatGPT Image May 7, 2026, 10_56_26 AM.png" alt="School Logo" class="school-logo">
    <div class="school-info">
      <h2>Govt. Sr. Sec. School Shilla</h2>
      <span>School Management Panel</span>
    </div>
  </div>

  <div class="mobile-menu-btn" id="menuToggle">☰</div>

  <nav class="nav-menu" id="navLinks">
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="add-image.html">Gallery</a>
    <a href="admin-img.html">Home Slider</a>
    <a href="admin-faculity.html">Faculty</a>
    <a href="admin-notif.html" class="active">Notifications</a>
    <a href="admin-downl.html">Downloads</a>
    <a href="admin-contact.html">Contact</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </nav>
</header>

<div class="page-wrap">

  <h2>📢 Notification Manager</h2>

  <form id="noticeForm">
    <input type="text" name="title" placeholder="Title" required>

    <select name="type">
      <option value="general">General</option>
      <option value="exam">Exam</option>
      <option value="holiday">Holiday</option>
    </select>

    <textarea name="message" placeholder="Message" required></textarea>

    <label>
      <input type="checkbox" name="isImportant" value="1">
      Mark as Important Notice
    </label>

    <input type="file" name="file">

    <button type="submit">➕ Add Notification</button>
  </form>

  <div class="notice-list" id="noticeList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// ✅ Token globally define karo, localStorage se
const token = localStorage.getItem("token");

if (!token) {
  window.location.replace("login.html");
}

// Auth verify (optional double-check)
fetch("https://gsssshilla.onrender.com/verify-admin", {
  headers: { Authorization: `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {
  if (!data.success) {
    localStorage.removeItem("token");
    window.location.replace("login.html");
  }
})
.catch(() => {
  localStorage.removeItem("token");
  window.location.replace("login.html");
});

const API = "https://gsssshilla.onrender.com/notifications";
let notices = [];

/* LOAD */
async function load(){
  try {
    const res = await fetch(API);
    notices = await res.json();
    render();
  } catch (e) {
    document.getElementById("noticeList").innerHTML = `<div class="no-data">⚠️ Unable to load notifications</div>`;
  }
}

/* RENDER */
function render(){
  const box = document.getElementById("noticeList");
  box.innerHTML = "";

  if (!notices || !notices.length) {
    box.innerHTML = `<div class="no-data">No notifications added yet</div>`;
    return;
  }

  notices.forEach(n => {
    box.innerHTML += `
      <div class="card">
        ${n.isImportant ? `<span class="important-badge">Important</span><br>` : ""}
        <h3>${n.title}</h3>
        <p>${n.message}</p>
        <div class="meta">📅 ${new Date(n.created_at).toLocaleString()} | Type: ${n.type}</div>
        <div class="actions">
          ${n.file ? `<a class="file-link" href="${n.file}" target="_blank">📄 View File</a>` : ""}
          <button class="delete-btn" onclick="del(${n.id})">🗑️ Delete</button>
        </div>
      </div>
    `;
  });
}

/* ADD */
document.getElementById("noticeForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = new FormData(e.target);

  const res = await fetch(API + "/add", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}` },
    body: form
  });

  const data = await res.json();
  alert(data.message || "Added");

  e.target.reset();
  load();
});

/* DELETE */
async function del(id){
  if (!confirm("Delete this notification?")) return;

  await fetch(API + "/" + id, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${token}` }
  });

  load();
}

/* MOBILE MENU */
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
  menuToggle.innerHTML = navLinks.classList.contains("active") ? "✕" : "☰";
});

function logout(){
  navLinks.classList.remove("active");
  menuToggle.innerHTML = "☰";

  Swal.fire({
    title: "Logout?",
    text: "Do you really want to logout from Admin Panel?",
    icon: "warning",
    showCancelButton: true,
    confirmButtonColor: "#D4AF37",
    cancelButtonColor: "#123A7A",
    confirmButtonText: "Yes, Logout",
    cancelButtonText: "Cancel"
  }).then((result) => {
    if (result.isConfirmed) {
      localStorage.removeItem("token");
      sessionStorage.clear();
      window.location.replace("login.html");
    }
  });
}

load();
</script>
</body>
</html>
