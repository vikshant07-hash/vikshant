<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================================
   MODERN FACULTY ADMIN PANEL
   SaaS LIGHT + NAVY + GOLD THEME
   RESPONSIVE + CARD UI + MODAL IMPROVED
========================================= */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --primary:#1E3A8A;
  --primary-light:#3B82F6;
  --gold:#F59E0B;

  --bg:#f6f8fc;
  --card:#ffffff;

  --text:#0f172a;
  --muted:#64748b;

  --border:rgba(15,23,42,.08);

  --shadow:0 10px 25px rgba(0,0,0,.06);
  --shadow-hover:0 18px 40px rgba(0,0,0,.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:linear-gradient(135deg,#f8fbff,#ffffff,#fffaf2);
  padding:0px;
  color:var(--text);
}

/* =========================
   TITLE
========================= */

h2{
  text-align:center;
  font-size:26px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:20px;
}

/* =========================
   FORM
========================= */

form{
  max-width:700px;
  margin:0 auto 25px;

  background:var(--card);
  padding:20px;

  border-radius:18px;
  border:1px solid var(--border);

  box-shadow:var(--shadow);

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

form input,
form select,
form textarea{
  padding:12px 14px;

  border-radius:12px;
  border:1px solid var(--border);

  outline:none;
  font-size:14px;

  background:#f9fbff;
}

form textarea{
  grid-column:1/-1;
  min-height:90px;
  resize:none;
}

form input:focus,
form select:focus,
form textarea:focus{
  border-color:var(--primary-light);
}

/* FILE + BUTTON FULL WIDTH */
form input[type="file"]{
  grid-column:1/-1;
}

form button{
  grid-column:1/-1;

  padding:12px;

  border:none;
  border-radius:12px;

  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:white;

  font-weight:600;
  cursor:pointer;

  transition:.25s;
}

form button:hover{
  transform:translateY(-2px);
}

/* =========================
   LIST GRID (CARD STYLE)
========================= */

#adminList{
  display:grid;
  gap:16px;
}

/* TEXT */
#adminList b{
  color:var(--primary);
  font-size:15px;
}

/* BUTTONS */
#adminList button{
  padding:6px 10px;
  margin-left:5px;

  border:none;
  border-radius:10px;

  font-size:12px;

  cursor:pointer;

  color:white;

  transition:.25s;
}

#adminList button:first-child{
  background:linear-gradient(135deg,#3b82f6,#7c3aed);
}

#adminList button:last-child{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

#adminList button:hover{
  transform:scale(1.05);
}

/* =========================
   MODAL (IMPROVED)
========================= */

.modal{
  display:none;
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.5);

  backdrop-filter:blur(4px);
}

.modal-content{
  background:white;

  width:90%;
  max-width:500px;

  margin:8% auto;
  padding:20px;

  border-radius:18px;

  box-shadow:var(--shadow);
}

.modal-content h3{
  margin-bottom:10px;
  color:var(--primary);
}

.modal-content form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.modal-content input,
.modal-content select,
.modal-content textarea{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

.modal-content textarea{
  grid-column:1/-1;
}

.modal-content button{
  grid-column:1/-1;

  padding:10px;

  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:white;

  border:none;
  border-radius:10px;

  cursor:pointer;
}

/* CLOSE BUTTON */
.modal-content span{
  float:right;
  cursor:pointer;
  font-size:18px;
  color:#ef4444;
}

/* =========================
   FACULTY CARD STYLE
========================= */

.faculty-card{
  background:white;
  border:1px solid rgba(15,23,42,.08);

  border-radius:18px;
  padding:14px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:0 10px 25px rgba(0,0,0,.06);

  transition:.3s ease;

  position:relative;
  overflow:hidden;
}

.faculty-card:hover{
  transform:translateY(-5px);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

/* TOP GOLD LINE */
.faculty-card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  height:3px;
  width:100%;
  background:linear-gradient(90deg,#1E3A8A,#F59E0B);
}

/* LEFT SECTION */
.faculty-left{
  display:flex;
  align-items:center;
  gap:12px;
}

/* AVATAR */
.avatar{
  width:55px;
  height:55px;

  border-radius:50%;

  overflow:hidden;

  background:linear-gradient(135deg,#1E3A8A,#3B82F6);

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;
  font-weight:700;
  font-size:16px;
  flex-shrink:0;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.info h3{
  font-size:15px;
  color:#1E3A8A;
  margin-bottom:3px;
}

.info p{
  font-size:12px;
  color:#64748b;
}

/* ACTION BUTTONS */
.actions{
  display:flex;
  gap:6px;
}

.actions button{
  padding:6px 10px;
  border:none;
  border-radius:10px;

  font-size:12px;
  cursor:pointer;

  color:white;

  transition:.2s;
}

.actions button:first-child{
  background:linear-gradient(135deg,#3b82f6,#7c3aed);
}

.actions button:last-child{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.actions button:hover{
  transform:scale(1.05);
}

/* =========================
   SEARCH + FILTER BAR
========================= */

.faculty-tools{
  max-width:900px;
  margin:0 auto 20px;

  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.faculty-tools input,
.faculty-tools select{
  padding:12px 14px;

  border-radius:12px;
  border:1px solid rgba(15,23,42,.08);

  outline:none;

  font-size:14px;

  background:white;

  box-shadow:0 6px 15px rgba(0,0,0,.05);

  min-width:220px;
}

.faculty-tools input:focus,
.faculty-tools select:focus{
  border-color:#3B82F6;
}

/* ===================================
   PROFESSIONAL ADMIN NAVBAR
=================================== */

.navbar{
    width:100%;
    position:sticky;
    top:0;
    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:space-between;

    background:linear-gradient(
        135deg,
        #081C45,
        #123A7A
    );

    padding:14px 25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.15);

    margin-bottom:25px;
}

.logo-section{
    display:flex;
    align-items:center;
    gap:14px;
}

.school-logo{
    width:55px;
    height:55px;

    border-radius:50%;
    object-fit:cover;

    border:3px solid #D4AF37;

    background:#fff;
}

.school-info{
    display:flex;
    flex-direction:column;
}

.school-info h2{
    color:#fff;
    font-size:18px;
    font-weight:700;
    line-height:1.2;
    margin:0;
}

.school-info span{
    color:#D4AF37;
    font-size:12px;
    font-weight:500;
}

.nav-menu{
    display:flex;
    align-items:center;
    gap:8px;
}

.nav-menu a{
    text-decoration:none;

    color:#dbeafe;

    padding:11px 15px;

    border-radius:10px;

    font-size:14px;
    font-weight:600;

    transition:.3s;
}

.nav-menu a:hover{
    background:rgba(212,175,55,.15);
    color:#fff;
}

.nav-menu a.active{
    background:#D4AF37;
    color:#081C45;
}

.logout-btn{
    margin-left:10px;

    border:none;

    background:linear-gradient(
        135deg,
        #20228f,
        #F5D76E
    );

    color:#081C45;

    padding:11px 22px;

    border-radius:50px;

    font-size:14px;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.logout-btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 8px 20px rgba(212,175,55,.35);
}

.mobile-menu-btn{
    display:none;

    color:#fff;

    font-size:28px;

    cursor:pointer;
}

/* ================= RESPONSIVE (single ordered block) ================= */

@media(max-width:1200px){
    .school-info h2{ font-size:16px; }
    .nav-menu a{ padding:10px 12px; font-size:13px; }
}

@media (max-width:992px){
  body{ padding:15px; }
  form{ max-width:100%; }
  .faculty-tools{ max-width:100%; }
}

@media(max-width:950px){
    .mobile-menu-btn{ display:block; }
    .nav-menu{
        position:absolute;
        top:100%;
        left:0;
        right:0;
        background:#081C45;
        flex-direction:column;
        padding:15px;
        gap:5px;
        display:none;
        box-shadow:0 15px 30px rgba(0,0,0,.2);
    }
    .nav-menu.active{ display:flex; }
    .nav-menu a{ width:100%; text-align:left; }
    .logout-btn{ width:100%; margin:10px 0 0; }
}

@media (max-width:768px){
  body{ padding:10px; }
  h2{ font-size:22px; margin:15px 0; }

  #facultyForm{ grid-template-columns:1fr; padding:15px; border-radius:16px; gap:12px; }
  #facultyForm input, #facultyForm select, #facultyForm textarea, #facultyForm button{ width:100%; min-width:100%; }
  #facultyForm input, #facultyForm select{ height:48px; font-size:16px; }
  #facultyForm textarea{ min-height:120px; }
  #facultyForm button{ height:50px; font-size:15px; }

  .faculty-tools{ flex-direction:column; gap:10px; }
  .faculty-tools input, .faculty-tools select{ width:100%; min-width:100%; }

  .faculty-card{ flex-direction:column; align-items:flex-start; gap:12px; padding:15px; }
  .faculty-left{ width:100%; }
  .actions{ width:100%; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .actions button{ width:100%; margin:0; }
  .avatar{ width:50px; height:50px; }

  .modal-content{ width:95%; margin:20px auto; padding:15px; max-height:90vh; overflow-y:auto; }
  .modal-content form{ grid-template-columns:1fr; }
  .modal-content input, .modal-content select, .modal-content textarea{ width:100%; }
  .modal-content textarea{ min-height:100px; }
}

@media(max-width:600px){
    .navbar{ padding:12px 15px; }
    .school-logo{ width:45px; height:45px; }
    .school-info h2{ font-size:14px; }
    .school-info span{ font-size:11px; }
}

@media(max-width:450px){
    .school-info h2{ font-size:13px; }
    .school-info span{ display:none; }
}
</style>
<header class="navbar">

    <!-- Left Logo -->
    <div class="logo-section">

        <img src="../1778132110413-ChatGPT Image May 7, 2026, 10_56_26 AM.png" alt="School Logo" class="school-logo">

        <div class="school-info">

        </div>

    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu-btn" id="menuToggle">

    <nav class="nav-menu" id="navLinks">

<h2> Faculty Admin Panel</h2>

<!-- FORM -->
<form id="facultyForm" enctype="multipart/form-data">

  <input name="name" placeholder="Name" required>

  <select name="type">
    <option value="">Select Type</option>
    <option value="staff">Staff</option>
    <option value="principal">Principal</option>
   
  </select>

  <input name="subject" placeholder="Subject">

  <input name="qualification" placeholder="Qualification">

  <input name="experience" placeholder="Experience">

  <input name="previous_school" placeholder="Previous School">

  <textarea name="message" placeholder="Message"></textarea>

  <input type="file" name="photo">

  <button type="submit">Add Faculty</button>

</form>

<hr>

<div class="faculty-tools">

  <input type="text" id="searchBox" placeholder="Search faculty name or subject...">

  <select id="typeFilter">
    <option value="all">All Type</option>
    <option value="principal">Principal</option>
    <option value="staff">Staff</option>
   
  </select>

</div>

<!-- LIST -->
<div id="adminList"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">

    <span onclick="closeModal()" style="float:right;cursor:pointer;">Close</span>

    <h3>Edit Faculty</h3>

    <form id="editForm">

      <input name="id" type="hidden">

      <input name="name" placeholder="Name">

      <select name="type">
        <option value="principal">Principal</option>
        <option value="staff">Staff</option>
       
      </select>

      <input name="subject" placeholder="Subject">

      <input name="qualification" placeholder="Qualification">

      <input name="experience" placeholder="Experience">

      <input name="previous_school" placeholder="Previous School">

      <textarea name="message" placeholder="Message"></textarea>

      <button type="submit">Update</button>

    </form>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>


// ✅ Token globally define karo, localStorage se
const token = localStorage.getItem("token");

if (!token) {
  window.location.replace("login.html");
}

// Auth verify (optional double-check)
fetch("https://gsssshilla.onrender.com/verify-admin", {
  headers: { Authorization: `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {
  if (!data.success) {
    localStorage.removeItem("token");
    window.location.replace("login.html");
  }
})
.catch(() => {
  localStorage.removeItem("token");
  window.location.replace("login.html");
});

const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {

    navLinks.classList.toggle("active");

    menuToggle.innerHTML =
    navLinks.classList.contains("active")
    ? "Close"
    : "Menu";

});

function logout(){

    navLinks.classList.remove("active");

    if(menuToggle){
        menuToggle.innerHTML = "Menu";
    }

    Swal.fire({
        title: "Logout?",
        text: "Do you really want to logout from Admin Panel?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#D4AF37",
        cancelButtonColor: "#123A7A",
        confirmButtonText: "Yes, Logout",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            localStorage.removeItem("token");
            sessionStorage.clear();

            window.location.replace("login.html");
        }

    });

}

/* ================= STATE ================= */
let allFaculty = [];

/* ================= ELEMENTS ================= */
const form = document.getElementById("facultyForm");
const editForm = document.getElementById("editForm");
const box = document.getElementById("adminList");
const searchBox = document.getElementById("searchBox");
const typeFilter = document.getElementById("typeFilter");

/* ================= ADD FACULTY ================= */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = new FormData(form);

  await fetch("https://gsssshilla.onrender.com/admin/faculty/add", {
    method: "POST",
    body: data,
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  form.reset();
  loadFaculty();
});

/* ================= LOAD FACULTY ================= */
function loadFaculty() {

  fetch("https://gsssshilla.onrender.com/faculty", {
    headers: {
      Authorization: `Bearer ${token}`
    }
  })
    .then(res => res.json())
    .then(data => {

      allFaculty = data || [];
      renderFaculty();

    })
    .catch(err => {
      console.error(err);
      box.innerHTML = `<p class="no-data">Error loading faculty</p>`;
    });
}

/* ================= FILTER + SEARCH ================= */
function getFilteredData() {

  const search = (searchBox?.value || "").toLowerCase();
  const type = typeFilter?.value || "all";

  return allFaculty.filter(f => {

    const matchSearch =
      (f.name || "").toLowerCase().includes(search) ||
      (f.subject || "").toLowerCase().includes(search);

    let matchType = true;

    if (type === "principal") matchType = f.type === "principal";
    if (type === "staff") matchType = f.type === "staff";
    if (type === "non-staff") matchType = f.type === "non-staff";

    return matchSearch && matchType;
  });
}

/* ================= RENDER ================= */
function renderFaculty() {

  const data = getFilteredData();
  box.innerHTML = "";

  if (!data.length) {
    box.innerHTML = `<p class="no-data">No Faculty Found</p>`;
    return;
  }

  data.forEach(f => {

    const initials = (f.name || "")
      .split(" ")
      .map(n => n[0])
      .join("")
      .toUpperCase();

    box.innerHTML += `
      <div class="faculty-card">

        <div class="faculty-left">

          <div class="avatar">
            ${
              f.photo
  ? `<img src="${f.photo}" />`
  : `<span>${initials}</span>`
            }
          </div>

          <div class="info">
            <h3>${f.name}</h3>
            <p>${f.subject || "No Subject"} • ${f.type}</p>
          </div>

        </div>

        <div class="actions">
          <button onclick="editFaculty(${f.id})">Edit</button>
          <button onclick="deleteFaculty(${f.id})">Delete</button>
        </div>

      </div>
    `;
  });
}

/* ================= SEARCH EVENTS ================= */
searchBox.addEventListener("input", renderFaculty);
typeFilter.addEventListener("change", renderFaculty);

/* ================= DELETE ================= */
function deleteFaculty(id) {

  if (!confirm("Are you sure?")) return;

  fetch(`https://gsssshilla.onrender.com/admin/faculty/delete/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${token}`
    }
  })
    .then(() => loadFaculty());
}

/* ================= EDIT OPEN ================= */
function editFaculty(id) {

  fetch(`https://gsssshilla.onrender.com/faculty/${id}`, {
    headers: {
      Authorization: `Bearer ${token}`
    }
  })
    .then(res => res.json())
    .then(f => {

      document.getElementById("editModal").style.display = "block";

      editForm.id.value = f.id;
      editForm.name.value = f.name;
      editForm.type.value = f.type;
      editForm.subject.value = f.subject;
      editForm.qualification.value = f.qualification;
      editForm.experience.value = f.experience;
      editForm.previous_school.value = f.previous_school;
      editForm.message.value = f.message;
    });
}

/* ================= UPDATE ================= */
editForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const id = editForm.id.value;

  const data = {
    name: editForm.name.value,
    type: editForm.type.value,
    subject: editForm.subject.value,
    qualification: editForm.qualification.value,
    experience: editForm.experience.value,
    previous_school: editForm.previous_school.value,
    message: editForm.message.value
  };

  await fetch(`https://gsssshilla.onrender.com/admin/faculty/update/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify(data)
  });

  closeModal();
  loadFaculty();
});

/* ================= MODAL CLOSE ================= */
function closeModal() {
  document.getElementById("editModal").style.display = "none";
}

/* ================= INIT ================= */
loadFaculty();

</script>
