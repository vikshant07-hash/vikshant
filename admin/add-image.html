<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:0px;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

h1{
margin-bottom:20px;
}

input[type=text],
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
}

textarea{
height:120px;
resize:none;
}

input[type=file]{
margin-bottom:15px;
}

.preview{
width:100%;
max-height:300px;
object-fit:cover;
border-radius:10px;
display:none;
margin-bottom:15px;
}

.btn{
background:#2563eb;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.gallery-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.gallery-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.gallery-card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:15px;
}

.content h3{
margin-bottom:10px;
}

.content p{
color:#555;
font-size:14px;
}

.featured{
display:inline-block;
padding:5px 12px;
background:green;
color:white;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.delete-btn{
width:100%;
padding:12px;
background:#dc2626;
color:white;
border:none;
cursor:pointer;
}

.delete-btn:hover{
background:#b91c1c;
}

@media(max-width:768px){

body{
padding:10px;
}

}

/* ===================================
   PROFESSIONAL ADMIN NAVBAR
=================================== */

.navbar{
    width:100%;
    position:sticky;
    top:0;
    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:space-between;

    background:linear-gradient(
        135deg,
        #081C45,
        #123A7A
    );

    padding:14px 25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.15);

    margin-bottom:25px;
}

/* Logo */

.logo-section{
    display:flex;
    align-items:center;
    gap:14px;
}

.school-logo{
    width:55px;
    height:55px;

    border-radius:50%;
    object-fit:cover;

    border:3px solid #D4AF37;

    background:#fff;
}

.school-info{
    display:flex;
    flex-direction:column;
}

.school-info h2{
    color:#fff;
    font-size:18px;
    font-weight:700;
    line-height:1.2;
}

.school-info span{
    color:#D4AF37;
    font-size:12px;
    font-weight:500;
}

/* Nav */

.nav-menu{
    display:flex;
    align-items:center;
    gap:8px;
}

.nav-menu a{
    text-decoration:none;

    color:#dbeafe;

    padding:11px 15px;

    border-radius:10px;

    font-size:14px;
    font-weight:600;

    transition:.3s;
}

.nav-menu a:hover{
    background:rgba(212,175,55,.15);
    color:#fff;
}

.nav-menu a.active{
    background:#D4AF37;
    color:#081C45;
}

/* Logout */

.logout-btn{
    margin-left:10px;

    border:none;

    background:linear-gradient(
        135deg,
        #3a168d,
        #F5D76E
    );

    color:#081C45;

    padding:11px 22px;

    border-radius:50px;

    font-size:14px;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.logout-btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 8px 20px rgba(212,175,55,.35);
}

/* Mobile Menu Button */

.mobile-menu-btn{
    display:none;

    color:#fff;

    font-size:28px;

    cursor:pointer;
}

/* ===================================
   TABLET
=================================== */

@media(max-width:1200px){

    .school-info h2{
        font-size:16px;
    }

    .nav-menu a{
        padding:10px 12px;
        font-size:13px;
    }

}

/* ===================================
   MOBILE
=================================== */

@media(max-width:950px){

    .mobile-menu-btn{
        display:block;
    }

    .nav-menu{

        position:absolute;

        top:100%;

        left:0;
        right:0;

        background:#081C45;

        flex-direction:column;

        padding:15px;

        gap:5px;

        display:none;

        box-shadow:
        0 15px 30px rgba(0,0,0,.2);
    }

    .nav-menu.active{
        display:flex;
    }

    .nav-menu a{
        width:100%;
        text-align:left;
    }

    .logout-btn{
        width:100%;
        margin:10px 0 0;
    }

}

/* ===================================
   SMALL MOBILE
=================================== */

@media(max-width:600px){

    .navbar{
        padding:12px 15px;
    }

    .school-logo{
        width:45px;
        height:45px;
    }

    .school-info h2{
        font-size:14px;
    }

    .school-info span{
        font-size:11px;
    }

}

/* ===================================
   EXTRA SMALL
=================================== */

@media(max-width:450px){

    .school-info h2{
        font-size:13px;
    }

    .school-info span{
        display:none;
    }

}


/* Page content overlap fix */
.admin-notice{
    min-height:100vh;
    padding:100px 20px 40px;
}








</style>
</head>
<body>
<header class="navbar">

    <!-- Left Logo -->
    <div class="logo-section">

        <img src="../1778132110413-ChatGPT Image May 7, 2026, 10_56_26 AM.png" alt="School Logo" class="school-logo">

        <div class="school-info">
            <h2>Govt. Sr. Sec. School Shilla</h2>
            <span>Gallery Management Panel</span>
        </div>

    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu-btn" id="menuToggle">
        ☰
    </div>

    <!-- Nav -->
    <nav class="nav-menu" id="navLinks">

        <a href="admin-dashboard.html">Dashboard</a>

        <a href="add-image.html" class="active">
            Gallery
        </a>

        <a href="admin-img.html">
            Home Slider
        </a>

        <a href="admin-faculity.html">
            Faculty
        </a>

        <a href="admin-notif.html">
            Notifications
        </a>

        <a href="admin-downl.html">
            Downloads
        </a>

        <a href="visitor.html">
            Visitors
        </a>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </nav>

</header>

<div class="container">



<h1>Gallery Management</h1>

<form id="galleryForm">

<input
type="text"
id="title"
placeholder="Image Title"
required>

<textarea
id="description"
placeholder="Image Description">
</textarea>

<input
type="file"
id="image"
accept="image/*"
required>

<img
id="preview"
class="preview">

<label>

<input
type="checkbox"
id="featured">

 Add To Slider

</label>

<br><br>

<button
type="submit"
class="btn">

Upload Image

</button>

</form>

</div>


<div>

<h2 style="margin-bottom:20px;">
Gallery Images
</h2>

<div
id="galleryGrid"
class="gallery-grid">
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

// ✅ Token globally define karo, localStorage se
const token = localStorage.getItem("token");

if (!token) {
  window.location.replace("login.html");
}

// Auth verify (optional double-check)
fetch("https://gsssshilla.onrender.com/verify-admin", {
  headers: { Authorization: `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {
  if (!data.success) {
    localStorage.removeItem("token");
    window.location.replace("login.html");
  }
})
.catch(() => {
  localStorage.removeItem("token");
  window.location.replace("login.html");
});

function logout(){

    const navLinks = document.getElementById("navLinks");
    const menuToggle = document.getElementById("menuToggle");

    navLinks.classList.remove("active");

    if(menuToggle){
        menuToggle.innerHTML = "☰";
    }

    Swal.fire({
        title: "Logout?",
        text: "Do you really want to logout from Admin Panel?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#D4AF37",
        cancelButtonColor: "#123A7A",
        confirmButtonText: "Yes, Logout",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            localStorage.removeItem("token");
            sessionStorage.clear();

            window.location.replace("login.html");
        }

    });

}

const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {

    navLinks.classList.toggle("active");

    menuToggle.innerHTML =
    navLinks.classList.contains("active")
    ? "✕"
    : "☰";

});

function logout(){

    localStorage.removeItem("token");
    window.location.href = "login.html";

}

const API =
"https://gsssshilla.onrender.com/api/gallery";

const IMAGE_URL =
"https://gsssshilla.onrender.com/https://gsssshilla.onrender.comgallery";

const form =
document.getElementById(
"galleryForm"
);

const grid =
document.getElementById(
"galleryGrid"
);


// IMAGE PREVIEW

document
.getElementById("image")
.addEventListener(
"change",
function(){

const file =
this.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = e => {

const preview =
document.getElementById(
"preview"
);

preview.src =
e.target.result;

preview.style.display =
"block";

};

reader.readAsDataURL(file);

});




// LOAD GALLERY

async function loadGallery(){

try{

const res =
await fetch(API);

const data =
await res.json();

grid.innerHTML = "";

data.forEach(item => {
  grid.innerHTML += `
    <div class="gallery-card">

      <img src="${item.image}" alt="${item.title}" loading="lazy">

      <div class="content">
        ${item.featured == 1 ? '<div class="featured">Featured</div>' : ''}
        <h3>${item.title}</h3>
        <p>${item.description || ''}</p>
      </div>

      <button class="delete-btn" onclick="deleteImage(${item.id})">
        Delete
      </button>

    </div>
  `;
});

}catch(err){

console.error(err);

}

}




// UPLOAD IMAGE

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const file =
document.getElementById(
"image"
).files[0];

if(!file){

alert(
"Please Select Image"
);

return;

}

const fd =
new FormData();

fd.append(
"title",
document.getElementById(
"title"
).value
);

fd.append(
"description",
document.getElementById(
"description"
).value
);

fd.append(
"featured",
document.getElementById(
"featured"
).checked ? 1 : 0
);

fd.append(
"image",
file
);

try{

const res =
await fetch(
API,
{
method:"POST",
body:fd
}
);

const data =
await res.json();

alert(
data.message
);

form.reset();

document.getElementById(
"preview"
).style.display="none";

loadGallery();

}catch(err){

console.error(err);

alert(
"Upload Failed"
);

}

});




// DELETE

async function deleteImage(id){

if(
!confirm(
"Delete Image ?"
)
)return;

try{

const res =
await fetch(
`${API}/${id}`,
{
method:"DELETE"
}
);

const data =
await res.json();

alert(
data.message
);

loadGallery();

}catch(err){

console.error(err);

}

}

function logout(){

    const navLinks = document.getElementById("navLinks");
    const menuToggle = document.getElementById("menuToggle");

    navLinks.classList.remove("active");

    if(menuToggle){
        menuToggle.innerHTML = "☰";
    }

    Swal.fire({
        title: "Logout?",
        text: "Do you really want to logout from Admin Panel?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#D4AF37",
        cancelButtonColor: "#123A7A",
        confirmButtonText: "Yes, Logout",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            localStorage.removeItem("token");
            sessionStorage.clear();

            window.location.replace("login.html");
        }

    });

}



loadGallery();

</script>

</body>
</html>
